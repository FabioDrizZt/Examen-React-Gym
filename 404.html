<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase no encontrada - Birra y Bíceps</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .error-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <h1 class="logo-title-large">🍻💪 BIRRA Y BÍCEPS</h1>
            <p class="slogan-large">Porque la vida es equilibrio.</p>

            <div class="error-message">
                <h2 class="error-code">404</h2>
                <h3 class="error-title">¡Clase No Encontrada!</h3>
                <p class="error-description">
                    Parece que esta clase se fue a tomar una birra sin avisar. 🍻
                </p>
                <p class="error-subdescription">
                    No te preocupes, tenemos muchas otras clases esperándote en el catálogo.
                </p>

                <a href="/" class="btn-quilmes btn-large">
                    🔙 Volver al Catálogo
                </a>
            </div>

            <div class="beer-animation" style="margin-top: 2rem; font-size: 3rem;">
                <div class="beer-glass" style="display: inline-block;">🍺</div>
                <div class="dumbbell" style="display: inline-block;">🏋️‍♂️</div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de Clase - Birra y Bíceps</title>
    <!-- Incluimos los estilos base -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <!-- HEADER CON LOGIN -->

        <div class="brand-container">
            <h1 class="logo-title">🍻💪 BIRRA Y BÍCEPS</h1>
            <p class="slogan">Porque la vida es equilibrio.</p>
        </div>

        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <!-- En React esto corresponde a la vista del componente <ClaseDetails /> -->

        <div id="clase-details-container">
            <article class="container loading">
                <div class="loader"></div>
            </article>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>🍻 Birra y Bíceps © 2025 - Gimnasio con Actitud | Bebe con Responsabilidad 🍺</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="/js/auth.js"></script>
    <script src="/js/clase.js"></script>

</html>
